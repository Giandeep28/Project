<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon — SkyVoyage</title>
    <meta name="description" content="This page is under development. Stay tuned for exciting new features from SkyVoyage.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #C5A059;
            --primary-dark: #A48446;
            --dark: #000814;
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            --border: rgba(255, 255, 255, 0.08);
            --glow-gold: 0 0 25px rgba(197, 160, 89, 0.25);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(197, 160, 89, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(197, 160, 89, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        .content {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 2rem;
        }

        .plane-icon {
            font-size: 5rem;
            margin-bottom: 2rem;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(197, 160, 89, 0.4));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .logo-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
            margin-bottom: 3rem;
        }
        .logo-icon {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--glow-gold);
        }
        .logo-text {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 1.5px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 950;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-tag {
            display: inline-block;
            background: rgba(197, 160, 89, 0.1);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 2rem;
            border: 1px solid rgba(197, 160, 89, 0.2);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.15rem;
            max-width: 500px;
            line-height: 1.8;
            margin: 0 auto 3rem;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 1rem 3rem;
            background: var(--primary);
            color: var(--dark);
            border: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--glow-gold);
        }
        .btn-home:hover {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(197, 160, 89, 0.3);
        }

        .page-path {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* Glow orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            right: -100px;
        }
        .orb-2 {
            width: 300px;
            height: 300px;
            background: #3B82F6;
            bottom: -50px;
            left: -50px;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="content">
        <a href="/skyvoyage-complete.html" class="logo-link">
            <div class="logo-icon">✈️</div>
            <span class="logo-text">SKYVOYAGE</span>
        </a>

        <div class="plane-icon">✈️</div>

        <div class="status-tag">🚧 Under Development</div>

        <h1>COMING SOON</h1>
        
        <p class="subtitle">
            We're crafting something extraordinary for you. This section of SkyVoyage is currently being built with the premium experience you deserve.
        </p>

        <a href="/skyvoyage-complete.html" class="btn-home">
            <i class="fas fa-arrow-left"></i>
            RETURN TO HOME
        </a>

        <div class="page-path" id="page-path"></div>
    </div>

    <script>
        // Show the attempted path
        document.getElementById('page-path').textContent = 'Requested: ' + window.location.pathname;
    </script>
</body>
</html>
