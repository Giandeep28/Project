<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SkyVoyage - Production-level flight booking website with proper routing system">
    <meta name="keywords" content="flight booking, travel, airline, skyvoyage, react">
    <title>SkyVoyage - Your Journey, Our Expertise</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
    
    <!-- React Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Loading Fallback -->
    <div id="loading">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading SkyVoyage...</p>
        </div>
    </div>

    <script>
        // Hide loading when React app loads
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(function() {
                        loading.style.display = 'none';
                    }, 300);
                }
            }, 1000);
        });
    </script>
</body>
</html>
